name: .NET 8.0 Build and Test

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual triggering

jobs:
  build:
    runs-on: windows-latest # Using Windows because of System.Speech dependency
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET 8.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Build
      run: dotnet build --no-restore --configuration Release
      
    - name: Test
      run: dotnet test --no-build --configuration Release --verbosity normal
      
    - name: Publish (Windows)
      run: dotnet publish --configuration Release --runtime win-x64 --self-contained false --output ./publish/win-x64
      
    - name: Publish (Linux)
      run: dotnet publish --configuration Release --runtime linux-x64 --self-contained false --output ./publish/linux-x64
      
    - name: Publish (macOS)
      run: dotnet publish --configuration Release --runtime osx-x64 --self-contained false --output ./publish/osx-x64
      
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: CyberSecurityChatbot-Builds
        path: ./publish/**
