name: .NET Build and Test

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest  # Using Windows since you have Windows-specific packages
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    
    - name: Restore dependencies
      run: dotnet restore CyberSecurityChatBot.csproj
    
    - name: Build
      run: dotnet build CyberSecurityChatBot.csproj --configuration Release --no-restore
    
    - name: Test
      run: dotnet test CyberSecurityChatBot.csproj --configuration Release --no-build --verbosity normal
      continue-on-error: true  # Continue even if no tests exist
    
    - name: Publish
      run: dotnet publish CyberSecurityChatBot.csproj --configuration Release --output ./publish
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: CyberSecurityChatBot
        path: ./publish/
