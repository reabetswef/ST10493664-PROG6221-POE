name: .NET 8.0 Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET 8.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    
    - name: Display structure of downloaded files
      run: tree /F
      shell: cmd
    
    - name: Find and build project
      run: |
        # Find all .csproj files and build the first one
        $projects = Get-ChildItem -Recurse -Filter *.csproj
        if ($projects.Count -eq 0) {
          Write-Error "No .csproj files found!"
          exit 1
        }
        
        $projectPath = $projects[0].FullName
        Write-Host "Found project: $projectPath"
        
        # Get the directory containing the project
        $projectDir = Split-Path $projectPath -Parent
        
        # Restore and build
        dotnet restore "$projectPath"
        dotnet build "$projectPath" --configuration Release --no-restore
        
        # Publish
        dotnet publish "$projectPath" --configuration Release --output "$env:GITHUB_WORKSPACE/publish"
      shell: pwsh
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: CyberSecurityChatbot
        path: publish/
