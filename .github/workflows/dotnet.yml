name: .NET Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    - name: Display files (debug)
      run: ls -R

    - name: Restore project
      run: dotnet restore ./CyberSecurityChatbot.csproj

    - name: Build project
      run: dotnet build ./CyberSecurityChatbot.csproj --configuration Release --no-restore

    - name: Skip tests
      run: echo "No tests yet"
